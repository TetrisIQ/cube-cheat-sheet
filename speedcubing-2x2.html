<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Speedcubing Cheat Sheet - 2x2 Ortega</title>
    <link rel="stylesheet" href="speedcubing-cheatsheet.css">

<body>
    <main class="page">
        <section class="hero">

            <nav class="hero-nav cube-tabs" aria-label="Cube size navigation">

                <div id="status" class="status"></div>

    <script>
        window.speedcubingApp.renderHeaderScrambles(document.getElementById("heroScrambles"), "2x2", true);

            document.getElementById("status")
