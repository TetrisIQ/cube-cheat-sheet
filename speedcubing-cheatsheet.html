<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Speedcubing Cheat Sheet</title>
    <link rel="stylesheet" href="speedcubing-cheatsheet.css">
</head>

<body>
    <main class="page">
        <section class="hero">
            <h1>Speedcubing Cheat Sheet</h1>
            <p>
                Edit your algorithms and visualize notation moves with generated SVG icons.
                Use cube tabs to switch between 2x2, 3x3, and 4x4 sets.
            </p>
            <div class="cube-tabs" id="cubeTabs">
                <button class="cube-tab active" data-cube="2x2" type="button">2x2 Ortega</button>
                <button class="cube-tab" data-cube="3x3" type="button">3x3</button>
                <button class="cube-tab" data-cube="4x4" type="button">4x4</button>
            </div>
        </section>

        <section class="layout">
            <section class="panel">
                <h2>Cheat Sheet</h2>
                <div id="status" class="status"></div>
                <div id="sheet" class="sheet"></div>
            </section>
        </section>
    </main>

    <script>
        const CONFIG_PATH = "./speedcubing-config.json";
        const SVG_NS = "http://www.w3.org/2000/svg";
        const faceColors = {
            y: "#f7d84a",
            w: "#f5f7fb",
            g: "#31b45b",
            G: "#b8c0cf",
            b: "#3567d9",
            r: "#dc4b4b",
            o: "#f08a3a"
        };

        const fallbackConfig = {
            cubes: {
                "2x2 Ortega": {
                    groups: []
                },
                "3x3": {
                    groups: []
                },
                "4x4": {
                    groups: []
                }
            }
        };

        const cubeTabsEl = document.getElementById("cubeTabs");
        const cubeTabButtons = Array.from(cubeTabsEl.querySelectorAll(".cube-tab"));
        const statusEl = document.getElementById("status");
        const sheetEl = document.getElementById("sheet");

        let activeCube = "2x2";
        let appConfig = fallbackConfig;

        function makeSvgEl(name, attrs) {
            const el = document.createElementNS(SVG_NS, name);
            Object.entries(attrs).forEach(([key, value]) => {
                el.setAttribute(key, value);
            });
            return el;
        }

        function setStatus(message, isError = false) {
            statusEl.textContent = message;
            statusEl.style.color = isError ? "#a52b2b" : "#2e436f";
        }

        function getCubeData(cubeId) {
            const empty = { groups: [] };
            if (!appConfig || !appConfig.cubes || typeof appConfig.cubes !== "object") {
                return empty;
            }

            if (appConfig.cubes[cubeId]) {
                return appConfig.cubes[cubeId];
            }

            const normalizedTarget = String(cubeId || "").toLowerCase().replace(/\s+/g, "");
            const matchKey = Object.keys(appConfig.cubes).find((key) => {
                const normalizedKey = String(key || "").toLowerCase().replace(/\s+/g, "");
                return normalizedKey === normalizedTarget || normalizedKey.startsWith(normalizedTarget);
            });

            return matchKey ? appConfig.cubes[matchKey] : empty;
        }

        function oppositeDirection(dir) {
            const opposites = { up: "down", down: "up", left: "right", right: "left" };
            return opposites[dir] || dir;
        }

        function directionForMove(move) {
            const face = (move.match(/[URFDLB]/i) || ["F"])[0].toUpperCase();
            const clockwiseByFace = {
                U: "left",
                D: "left",
                R: "up",
                L: "down",
                F: "right",
                B: "left"
            };
            const base = clockwiseByFace[face] || "right";
            return move.includes("'") ? oppositeDirection(base) : base;
        }

        function highlightRectForFace(face) {
            const rects = {
                U: { x: "8", y: "6", width: "20", height: "6" },
                D: { x: "8", y: "24", width: "20", height: "6" },
                R: { x: "24", y: "8", width: "6", height: "20" },
                L: { x: "6", y: "8", width: "6", height: "20" },
                F: { x: "12", y: "12", width: "12", height: "12" },
                B: { x: "11", y: "11", width: "14", height: "14" }
            };
            return rects[face] || rects.F;
        }

        function addArrowToSvg(svg, direction) {
            const arrows = {
                up: { line: "18 24 18 12", head: "18,10 14.8,14.2 21.2,14.2" },
                down: { line: "18 12 18 24", head: "18,26 14.8,21.8 21.2,21.8" },
                left: { line: "24 18 12 18", head: "10,18 14.2,14.8 14.2,21.2" },
                right: { line: "12 18 24 18", head: "26,18 21.8,14.8 21.8,21.2" }
            };
            const cfg = arrows[direction] || arrows.right;
            const lineParts = cfg.line.split(" ");

            svg.appendChild(makeSvgEl("line", {
                x1: lineParts[0],
                y1: lineParts[1],
                x2: lineParts[2],
                y2: lineParts[3],
                stroke: "#1f3f92",
                "stroke-width": "2",
                "stroke-linecap": "round"
            }));

            svg.appendChild(makeSvgEl("polygon", {
                points: cfg.head,
                fill: "#1f3f92"
            }));
        }

        function createMoveSvg(move) {
            const face = (move.match(/[URFDLB]/i) || ["F"])[0].toUpperCase();
            const svg = makeSvgEl("svg", {
                class: "move-icon",
                viewBox: "0 0 36 36",
                "aria-hidden": "true",
                focusable: "false"
            });

            svg.appendChild(makeSvgEl("rect", {
                x: "2",
                y: "2",
                width: "32",
                height: "32",
                rx: "6",
                fill: "#f4f7ff",
                stroke: "#90a5d6",
                "stroke-width": "1"
            }));

            const hl = highlightRectForFace(face);
            svg.appendChild(makeSvgEl("rect", {
                ...hl,
                rx: "1.8",
                fill: "#c8d6f9"
            }));

            svg.appendChild(makeSvgEl("line", { x1: "13", y1: "6", x2: "13", y2: "30", stroke: "#b7c6ea", "stroke-width": "1" }));
            svg.appendChild(makeSvgEl("line", { x1: "23", y1: "6", x2: "23", y2: "30", stroke: "#b7c6ea", "stroke-width": "1" }));
            svg.appendChild(makeSvgEl("line", { x1: "6", y1: "13", x2: "30", y2: "13", stroke: "#b7c6ea", "stroke-width": "1" }));
            svg.appendChild(makeSvgEl("line", { x1: "6", y1: "23", x2: "30", y2: "23", stroke: "#b7c6ea", "stroke-width": "1" }));

            addArrowToSvg(svg, directionForMove(move));

            if (move.includes("2")) {
                svg.appendChild(makeSvgEl("text", {
                    x: "28",
                    y: "12",
                    fill: "#203f8f",
                    "font-size": "8",
                    "font-family": "Menlo, Consolas, monospace",
                    "font-weight": "700",
                    "text-anchor": "middle"
                })).textContent = "2";
            }

            return svg;
        }

        function createMoveEl(move) {
            const moveEl = document.createElement("span");
            moveEl.className = "move";
            moveEl.appendChild(createMoveSvg(move));

            const label = document.createElement("span");
            label.className = "move-text";
            label.textContent = move;
            moveEl.appendChild(label);

            return moveEl;
        }

        function colorFromCode(code) {
            const raw = String(code || "").trim();
            if (Object.prototype.hasOwnProperty.call(faceColors, raw)) {
                return faceColors[raw];
            }
            return faceColors[raw.toLowerCase()] || "#d9e0f2";
        }

        function drawFace(svg, stickers, size, x, y, cell) {
            for (let row = 0; row < size; row += 1) {
                for (let col = 0; col < size; col += 1) {
                    const idx = row * size + col;
                    const fill = colorFromCode(stickers[idx]);
                    svg.appendChild(makeSvgEl("rect", {
                        x: String(x + col * cell),
                        y: String(y + row * cell),
                        width: String(cell - 1),
                        height: String(cell - 1),
                        rx: "1.2",
                        fill,
                        stroke: "#7e8fbf",
                        "stroke-width": "0.8"
                    }));
                }
            }
        }

        function normalizeFaceGrid(faceData, size, fallbackCode) {
            const fallbackRows = Array.from({ length: size }, () =>
                Array.from({ length: size }, () => fallbackCode)
            );

            if (!Array.isArray(faceData) || !faceData.length) {
                return fallbackRows;
            }

            if (typeof faceData[0] === "string" && faceData[0].includes("|")) {
                const rows = faceData
                    .slice(0, size)
                    .map((row) => String(row).split("|").slice(0, size));

                while (rows.length < size) {
                    rows.push(Array.from({ length: size }, () => fallbackCode));
                }

                return rows.map((row) => {
                    const fixed = row.map((code) => String(code || fallbackCode).trim() || fallbackCode);
                    while (fixed.length < size) {
                        fixed.push(fallbackCode);
                    }
                    return fixed;
                });
            }

            const legacyFlat = faceData.map((v) => String(v || fallbackCode));
            if (legacyFlat.length >= size * size) {
                const rows = [];
                for (let r = 0; r < size; r += 1) {
                    rows.push(legacyFlat.slice(r * size, r * size + size));
                }
                return rows;
            }

            return fallbackRows;
        }

        function drawHorizontalBand(svg, colors, x, yInner, yOuter, innerWidth, outerWidth) {
            const count = colors.length;
            const innerStep = innerWidth / count;
            const outerStep = outerWidth / count;
            const outerX = x - (outerWidth - innerWidth) / 2;

            for (let i = 0; i < count; i += 1) {
                const ix1 = x + i * innerStep;
                const ix2 = x + (i + 1) * innerStep;
                const ox1 = outerX + i * outerStep;
                const ox2 = outerX + (i + 1) * outerStep;

                svg.appendChild(makeSvgEl("polygon", {
                    points: `${ix1},${yInner} ${ix2},${yInner} ${ox2},${yOuter} ${ox1},${yOuter}`,
                    fill: colorFromCode(colors[i]),
                    stroke: "#7e8fbf",
                    "stroke-width": "0.8"
                }));
            }
        }

        function drawVerticalBand(svg, colors, xInner, xOuter, y, innerHeight, outerHeight) {
            const count = colors.length;
            const innerStep = innerHeight / count;
            const outerStep = outerHeight / count;
            const outerY = y - (outerHeight - innerHeight) / 2;

            for (let i = 0; i < count; i += 1) {
                const iy1 = y + i * innerStep;
                const iy2 = y + (i + 1) * innerStep;
                const oy1 = outerY + i * outerStep;
                const oy2 = outerY + (i + 1) * outerStep;

                svg.appendChild(makeSvgEl("polygon", {
                    points: `${xInner},${iy1} ${xInner},${iy2} ${xOuter},${oy2} ${xOuter},${oy1}`,
                    fill: colorFromCode(colors[i]),
                    stroke: "#7e8fbf",
                    "stroke-width": "0.8"
                }));
            }
        }

        function makeSolidFace(size, code) {
            return Array.from({ length: size * size }, () => code);
        }

        function createStartImageSvg(startImage, cubeId) {
            const size = Number(startImage && startImage.size) || Number(cubeId[0]) || 2;
            const faces = (startImage && startImage.faces) || {};
            const upGrid = normalizeFaceGrid(faces.U, size, "y");
            const frontGrid = normalizeFaceGrid(faces.F, size, "g");
            const rightGrid = normalizeFaceGrid(faces.R, size, "r");
            const backGrid = normalizeFaceGrid(faces.B, size, "b");
            const leftGrid = normalizeFaceGrid(faces.L, size, "o");

            const up = upGrid.flat();
            const frontRow = frontGrid[0];
            const rightRow = rightGrid[0];
            const backRow = backGrid[0];
            const leftRow = leftGrid[0];

            const faceWidth = size === 2 ? 34 : size === 3 ? 38 : 40;
            const bandDepth = size === 2 ? 10 : size === 3 ? 9 : 8;
            const expand = size === 2 ? 8 : size === 3 ? 6 : 5;
            const cell = faceWidth / size;
            const topX = 60 - faceWidth / 2;
            const topY = 26;

            const svg = makeSvgEl("svg", {
                class: "start-preview",
                viewBox: "0 0 120 96",
                "aria-hidden": "true",
                focusable: "false"
            });

            drawHorizontalBand(svg, backRow, topX, topY, topY - bandDepth, faceWidth, faceWidth + expand * 2);
            drawVerticalBand(svg, rightRow, topX + faceWidth, topX + faceWidth + bandDepth, topY, faceWidth, faceWidth + expand * 2);
            drawHorizontalBand(svg, frontRow, topX, topY + faceWidth, topY + faceWidth + bandDepth, faceWidth, faceWidth + expand * 2);
            drawVerticalBand(svg, leftRow, topX, topX - bandDepth, topY, faceWidth, faceWidth + expand * 2);

            drawFace(svg, up, size, topX, topY, cell);

            svg.appendChild(makeSvgEl("rect", {
                x: String(topX),
                y: String(topY),
                width: String(faceWidth),
                height: String(faceWidth),
                fill: "none",
                stroke: "#6f83b6",
                "stroke-width": "1.1"
            }));

            return svg;
        }

        function renderSheet(cubeId) {
            sheetEl.innerHTML = "";
            const cube = getCubeData(cubeId);
            const groups = Array.isArray(cube.groups) ? cube.groups : [];

            if (!groups.length) {
                const empty = document.createElement("div");
                empty.className = "hint";
                empty.textContent = `No ${cubeId} cases yet. Add groups and cases to speedcubing-config.json.`;
                sheetEl.appendChild(empty);
                return;
            }

            let caseCount = 0;
            groups.forEach((group) => {
                const cases = Array.isArray(group.cases) ? group.cases : [];
                if (!cases.length) {
                    return;
                }

                const block = document.createElement("section");
                block.className = "group-block";

                const title = document.createElement("h3");
                title.className = "group-title";
                title.textContent = group.name || "General";
                block.appendChild(title);

                cases.forEach((caseItem, index) => {
                    const card = document.createElement("article");
                    card.className = "alg-card";
                    card.style.animationDelay = `${index * 45}ms`;

                    const caseTop = document.createElement("div");
                    caseTop.className = "case-top";

                    const head = document.createElement("div");
                    head.className = "alg-head";

                    const name = document.createElement("div");
                    name.className = "alg-name";
                    name.textContent = caseItem.name || "Case";

                    const seqText = String(caseItem.sequence || "").trim();
                    const moveCount = seqText ? seqText.split(/\s+/).filter(Boolean).length : 0;

                    const meta = document.createElement("div");
                    meta.className = "alg-meta";
                    meta.textContent = `${moveCount} moves`;

                    head.appendChild(name);
                    head.appendChild(meta);

                    const preview = createStartImageSvg(caseItem.startImage, cubeId);
                    caseTop.appendChild(preview);
                    caseTop.appendChild(head);

                    const seq = document.createElement("div");
                    seq.className = "sequence";

                    seqText.split(/\s+/).filter(Boolean).forEach((move) => {
                        seq.appendChild(createMoveEl(move));
                    });

                    card.appendChild(caseTop);
                    card.appendChild(seq);
                    block.appendChild(card);
                    caseCount += 1;
                });

                sheetEl.appendChild(block);
            });

            setStatus(`Rendered ${caseCount} cases for ${cubeId}.`);
        }

        function setActiveCubeTab(cubeId) {
            cubeTabButtons.forEach((btn) => {
                btn.classList.toggle("active", btn.dataset.cube === cubeId);
            });
        }

        async function loadConfigFromFile() {
            try {
                const response = await fetch(`${CONFIG_PATH}?t=${Date.now()}`);
                if (!response.ok) {
                    throw new Error(`Could not load ${CONFIG_PATH} (${response.status}).`);
                }

                const json = await response.json();
                if (!json || typeof json !== "object" || !json.cubes || typeof json.cubes !== "object") {
                    throw new Error("Config JSON must contain a top-level cubes object.");
                }

                appConfig = json;
                renderSheet(activeCube);
            } catch (err) {
                setStatus(`${err.message || "Failed to read config."} If opened via file://, use a local server.`, true);
                sheetEl.innerHTML = "";
            }
        }

        cubeTabButtons.forEach((btn) => {
            btn.addEventListener("click", () => {
                if (btn.dataset.cube === activeCube) {
                    return;
                }
                activeCube = btn.dataset.cube;
                setActiveCubeTab(activeCube);
                renderSheet(activeCube);
            });
        });

        setActiveCubeTab(activeCube);
        loadConfigFromFile();
    </script>
</body>

</html>
